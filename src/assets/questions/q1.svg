<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">

<rect width="800" height="520" fill="#dcebd9"/>

<!-- جاده اصلی -->
<rect x="0" y="200" width="800" height="120" fill="#666d78"/>
<line x1="0" y1="260" x2="800" y2="260" stroke="white" stroke-width="6" stroke-dasharray="40 25"/>

<!-- جاده فرعی -->
<rect x="340" y="0" width="120" height="520" fill="#666d78"/>
<line x1="400" y1="0" x2="400" y2="520" stroke="white" stroke-width="6" stroke-dasharray="40 25"/>

<!-- خودرو سبز -->
<rect x="520" y="225" width="80" height="40" rx="8" fill="#16a34a"/>
<circle cx="540" cy="270" r="10"/>
<circle cx="580" cy="270" r="10"/>
<text x="560" y="250" font-size="18" fill="white" text-anchor="middle">GRÜN</text>

<!-- فلش خودرو سبز -->
<line x1="650" y1="245" x2="610" y2="245" stroke="white" stroke-width="8"/>
<polygon points="600,245 620,230 620,260" fill="white"/>

<!-- خودرو قرمز -->
<rect x="140" y="225" width="80" height="40" rx="8" fill="#dc2626"/>
<circle cx="160" cy="270" r="10"/>
<circle cx="200" cy="270" r="10"/>
<text x="180" y="250" font-size="18" fill="white" text-anchor="middle">ROT</text>

<!-- فلش قرمز -->
<line x1="240" y1="245" x2="290" y2="245" stroke="white" stroke-width="8"/>
<polygon points="300,245 280,230 280,260" fill="white"/>

<!-- خودروی من -->
<rect x="360" y="390" width="80" height="40" rx="8" fill="#2563eb"/>
<circle cx="380" cy="435" r="10"/>
<circle cx="420" cy="435" r="10"/>
<text x="400" y="415" font-size="18" fill="white" text-anchor="middle">ICH</text>

<!-- فلش من -->
<line x1="400" y1="360" x2="400" y2="320" stroke="white" stroke-width="8"/>
<polygon points="400,310 385,330 415,330" fill="white"/>

<!-- تابلو حق تقدم بده -->
<polygon points="470,330 510,400 430,400"
fill="white"
stroke="#dc2626"
stroke-width="8"/>

</svg>