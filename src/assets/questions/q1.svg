<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="560" fill="#dff3df"/>

  <!-- grass -->
  <rect x="0" y="0" width="900" height="560" fill="#dff3df"/>

  <!-- roads -->
  <rect x="0" y="210" width="900" height="140" fill="#6b7280"/>
  <rect x="380" y="0" width="140" height="560" fill="#6b7280"/>

  <!-- road borders -->
  <rect x="0" y="205" width="900" height="5" fill="#374151"/>
  <rect x="0" y="350" width="900" height="5" fill="#374151"/>
  <rect x="375" y="0" width="5" height="560" fill="#374151"/>
  <rect x="520" y="0" width="5" height="560" fill="#374151"/>

  <!-- center dashed lines -->
  <g stroke="#f9fafb" stroke-width="6" stroke-linecap="round">
    <line x1="40" y1="280" x2="100" y2="280"/>
    <line x1="150" y1="280" x2="210" y2="280"/>
    <line x1="690" y1="280" x2="750" y2="280"/>
    <line x1="800" y1="280" x2="860" y2="280"/>

    <line x1="450" y1="40" x2="450" y2="100"/>
    <line x1="450" y1="150" x2="450" y2="210"/>
    <line x1="450" y1="350" x2="450" y2="410"/>
    <line x1="450" y1="460" x2="450" y2="520"/>
  </g>

  <!-- intersection clear area -->
  <rect x="380" y="210" width="140" height="140" fill="#6b7280"/>

  <!-- traffic direction arrows -->
  <g fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M210 280 H330"/>
    <path d="M330 280 l-25 -18"/>
    <path d="M330 280 l-25 18"/>

    <path d="M690 280 H570"/>
    <path d="M570 280 l25 -18"/>
    <path d="M570 280 l25 18"/>

    <path d="M450 470 V370"/>
    <path d="M450 370 l-18 25"/>
    <path d="M450 370 l18 25"/>
  </g>

  <!-- yield sign near user's road -->
  <g transform="translate(530 370)">
    <polygon points="0,0 70,0 35,62" fill="#ffffff" stroke="#dc2626" stroke-width="8"/>
  </g>

  <!-- car blue - user car from bottom -->
  <g transform="translate(410 430)">
    <rect x="0" y="0" width="80" height="48" rx="10" fill="#2563eb" stroke="#1e40af" stroke-width="4"/>
    <rect x="12" y="8" width="56" height="18" rx="5" fill="#bfdbfe"/>
    <circle cx="18" cy="50" r="9" fill="#111827"/>
    <circle cx="62" cy="50" r="9" fill="#111827"/>
    <text x="40" y="32" text-anchor="middle" font-size="18" font-family="Arial" font-weight="700" fill="#ffffff">ICH</text>
  </g>

  <!-- car red from left -->
  <g transform="translate(150 230)">
    <rect x="0" y="0" width="90" height="48" rx="10" fill="#dc2626" stroke="#991b1b" stroke-width="4"/>
    <rect x="15" y="8" width="60" height="18" rx="5" fill="#fecaca"/>
    <circle cx="20" cy="50" r="9" fill="#111827"/>
    <circle cx="70" cy="50" r="9" fill="#111827"/>
    <text x="45" y="32" text-anchor="middle" font-size="18" font-family="Arial" font-weight="700" fill="#ffffff">ROT</text>
  </g>

  <!-- car green from right -->
  <g transform="translate(660 285)">
    <rect x="0" y="0" width="90" height="48" rx="10" fill="#16a34a" stroke="#166534" stroke-width="4"/>
    <rect x="15" y="8" width="60" height="18" rx="5" fill="#bbf7d0"/>
    <circle cx="20" cy="50" r="9" fill="#111827"/>
    <circle cx="70" cy="50" r="9" fill="#111827"/>
    <text x="45" y="32" text-anchor="middle" font-size="18" font-family="Arial" font-weight="700" fill="#ffffff">GRÜN</text>
  </g>

  <!-- title panel -->
  <rect x="24" y="24" width="410" height="60" rx="14" fill="#ffffff" stroke="#bbd7c0"/>
  <text x="44" y="62" font-size="25" font-family="Arial" font-weight="700" fill="#111827">
    Vorfahrt-Situation
  </text>

  <!-- note -->
  <rect x="566" y="24" width="310" height="60" rx="14" fill="#ffffff" stroke="#bbd7c0"/>
  <text x="586" y="62" font-size="22" font-family="Arial" font-weight="700" fill="#168a3a">
    Wer darf zuerst fahren?
  </text>
</svg>